name: CI

# Multi-platform test matrix. Motivated by a latent Windows-only DPAPI bug that
# shipped undetected because the hb-dpapi tests are `#[cfg(target_os = "windows")]`
# and CI/dev ran only on Linux. Every `#[cfg(target_os = ...)]`-gated test must run
# on its native runner, so a green Linux run is no longer treated as "tests pass".

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  test:
    name: test (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # hb-app embeds frontendDist (`ui/build`) at compile time via
      # `tauri::generate_context!`, so the frontend must be built before any
      # `cargo` command that compiles hb-app, on every OS in the matrix.
      - name: Build frontend (required to compile hb-app)
        working-directory: crates/hb-app/ui
        run: |
          npm ci
          npm run build

      - name: cargo test --workspace
        run: cargo test --workspace --locked

      # INV-4 (v0.9.6): Hoardbook moves no files. The transfer plane — the iroh transport dep, the
      # xfer/follower gate + the sealed presence address (hb-core), and the DownloadQueue UI — moved
      # to the Mascara companion and must not creep back (the standing honeypot tripwire). Greps code
      # CONSTRUCTS (dep lines, module decls, retired symbols, the component file), not prose, so the
      # legitimate "moved to Mascara" doc comments don't trip it. Ubuntu-only — one grep pass suffices.
      - name: INV-4 sweep — no file-transfer plane in Hoardbook
        if: matrix.platform == 'ubuntu-latest'
        shell: bash
        run: |
          set -uo pipefail
          fail=0
          sweep() { local desc="$1"; shift; if out=$(grep -rnE "$@" 2>/dev/null); then echo "::error::INV-4 regression — $desc:"; echo "$out"; fail=1; fi; }
          sweep "iroh (or an iroh-* crate) is back in Cargo.lock" 'name = "iroh[-"]' Cargo.lock
          sweep "iroh dep in a crate manifest"        'iroh' crates/*/Cargo.toml
          sweep "retired xfer crypto in hb-core"      'seal_addrs|unseal_addrs|resolve_node_key|verify_binding_token|follower_gate|SealedAddr|KIND_XFER' crates/hb-core/src
          # Covers `mod x`, `pub mod x`, `pub(crate)/pub(super)/pub(in ..) mod x`, and a same-line `#[cfg(..)] mod x`.
          sweep "a transfer/gate module declaration"  '^[[:space:]]*(#\[[^]]*\][[:space:]]*)*(pub(\([^)]*\))?[[:space:]]+)?mod[[:space:]]+(transfer|conn|p2p_it|gate)\b' crates
          sweep "the DownloadQueue component is back" 'DownloadQueue' crates/hb-app/ui/src
          if [ "$fail" -ne 0 ]; then echo "::error::Hoardbook moves no files (INV-4) — the above belongs in Mascara."; exit 1; fi
          echo "INV-4 sweep clean — no file-transfer plane in Hoardbook."
          # DISC3/INV-2: the discovery surface is structurally browse-key-free (audit I-5).
          if out=$(grep -rnE 'browse_key|BrowseKey' crates/hb-net/src/discover.rs 2>/dev/null); then
            echo "::error::INV-2 regression — the browse-key reached the discovery surface:"; echo "$out"; exit 1
          fi
          echo "DISC3/INV-2 probe clean — discover.rs is browse-key-free."
          # Tracked-files guard (audit I-9b): internal planning docs are gitignored (code-only
          # commits); a tracked one is a leak, not a doc.
          if tracked=$(git ls-files | grep -E '^(HOARDBOOK_SPEC|MASCARA_SPEC|PROMPT|HANDOVER|TEST_PLAN|REGRESSION|RELAY_DEPLOY|PROCESS_ENGINEERING|SEEDING|INVARIANT_AUDIT|SEMANTICS|MILESTONE1|CLAUDE)\.md$|^planning/'); then
            echo "::error::internal doc tracked in git — planning docs are gitignored; a tracked one is a leak, not a doc:"; echo "$tracked"; exit 1
          fi
          echo "Tracked-files guard clean — no internal docs in the git index."

      # release.yml overwrites both versions from the tag at build time; this pins dev-build
      # getVersion() honesty (audit I-8): tauri.conf.json must match the hb-app package version.
      - name: Version consistency — tauri.conf.json matches Cargo.toml
        if: matrix.platform == 'ubuntu-latest'
        shell: bash
        run: |
          python3 - <<'PY'
          import json, re, sys
          cargo = open('crates/hb-app/Cargo.toml').read()
          m = re.search(r'\[package\][^\[]*?\nversion\s*=\s*"([^"]+)"', cargo, flags=re.S)
          if not m:
              sys.exit('::error::no version found in crates/hb-app/Cargo.toml [package]')
          cargo_v = m.group(1)
          with open('crates/hb-app/tauri.conf.json') as f:
              tauri_v = json.load(f)['version']
          if cargo_v != tauri_v:
              sys.exit(f'::error::version drift (audit I-8) — Cargo.toml={cargo_v} vs tauri.conf.json={tauri_v}')
          print(f'versions in sync: {cargo_v}')
          PY

      # Clippy debt burned down 2026-07-03 (audit I-7) — clippy is now a blocking gate.
      - name: cargo clippy --workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

  # L2 — the appraisal-requested "integration in CI" leg, now possible because Nostr relays are
  # off-the-shelf and ephemeral. Spins TWO strfry relays (so the multi-relay cases DM4/ID4/AB8
  # actually run) using the vendored crates/hb-it/strfry.conf, then drives hb-net's client via
  # hb-it. Ubuntu-only (the relay is Linux/Docker); needs no frontend (hb-it doesn't touch hb-app).
  integration:
    name: integration (L2 — ephemeral Nostr relay)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # GitHub `services:` containers start before checkout, so the vendored strfry.conf can't be
      # volume-mounted into one — start strfry in a run: step after checkout instead (M2 brief §6).
      - name: Start two ephemeral strfry relays
        run: |
          docker run -d --name relay1 -p 7777:7777 \
            -v "$PWD/crates/hb-it/strfry.conf:/etc/strfry.conf:ro" \
            -v strfrydb1:/app/strfry-db dockurr/strfry
          docker run -d --name relay2 -p 7778:7777 \
            -v "$PWD/crates/hb-it/strfry.conf:/etc/strfry.conf:ro" \
            -v strfrydb2:/app/strfry-db dockurr/strfry

      - name: Wait for the relays to accept connections
        run: |
          for port in 7777 7778; do
            name=$([ "$port" = 7777 ] && echo relay1 || echo relay2)
            ok=
            for i in $(seq 1 60); do
              # Fail fast (with logs) if the container crashed instead of silently waiting 60s.
              if [ "$(docker inspect -f '{{.State.Running}}' "$name" 2>/dev/null)" != "true" ]; then
                echo "::error::$name exited before binding its port"; docker logs "$name" || true; exit 1
              fi
              if (exec 3<>/dev/tcp/127.0.0.1/$port) 2>/dev/null; then
                echo "$name on $port is up (after ${i}s)"; ok=1; break
              fi
              sleep 1
            done
            if [ -z "$ok" ]; then
              echo "::error::$name on $port never accepted a connection within 60s"; docker logs "$name" || true; exit 1
            fi
          done
          # Protocol-level readiness: the relay answers its NIP-11 relay-information document.
          for i in $(seq 1 15); do
            if curl -fsS -H 'Accept: application/nostr+json' http://127.0.0.1:7777 >/dev/null 2>&1; then
              echo "NIP-11 document served — relays ready"; break
            fi
            sleep 1
          done

      - name: Run the L2 integration suite (hb-it) — incl. Suite COUNT + Suite CANARY (M9)
        run: cargo run -p hb-it --locked -- --relay ws://127.0.0.1:7777 --relay ws://127.0.0.1:7778 --pow 8

      # M9 Track K: exercise the canary CLI end-to-end (the systemd oneshot form). A green backbone
      # must exit 0; a deliberately-broken relay must exit nonzero (the alarm fires). The two relays
      # simulate SG↔JP for the cross-region step.
      - name: Canary CLI — green backbone exits 0
        run: cargo run -p hb-it --locked -- --canary --relay ws://127.0.0.1:7777 --relay ws://127.0.0.1:7778

      - name: Canary CLI — broken relay exits nonzero (alarm fires)
        run: |
          if cargo run -p hb-it --locked -- --canary --relay ws://127.0.0.1:1; then
            echo "::error::canary exited 0 against a broken relay — the alarm did not fire"; exit 1
          else
            echo "canary correctly exited nonzero against a broken relay"
          fi

      - name: Relay logs (on failure)
        if: failure()
        run: docker logs relay1 && docker logs relay2

  frontend:
    name: frontend checks (svelte-check + vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: crates/hb-app/ui
        run: npm ci

      # svelte-check is the build-level guard for the content_types contract:
      # reading a nonexistent singular `content_type` is a strict-mode type error.
      - name: svelte-check
        working-directory: crates/hb-app/ui
        run: npm run check

      - name: vitest
        working-directory: crates/hb-app/ui
        run: npm test

  # L4 — the profiling gate (M9, Decision #18). Ubuntu-only, like frontend. Two cheap surfaces (no
  # webkit/frontend build needed): (a) the frontend recursive-tree profiler over M9's standalone
  # 2000-node fixture, compared to the checked-in perf-budgets.json (fails on a regression beyond
  # tolerance); (b) the F2 count-tally wall-clock budget (hb-core, no frontend dep). The Rust
  # background-loop idle guard (presence + watch loops idle; the spinning fixture must fail) runs in
  # the main `test` matrix as part of `cargo test --workspace`, so it isn't duplicated here.
  profiling:
    name: profiling (L4 — perf budgets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        working-directory: crates/hb-app/ui
        run: npm ci

      - name: Frontend L4 profiler + budget gate
        working-directory: crates/hb-app/ui
        run: npm run profile

      - name: Upload profiling report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: profiling-report
          path: crates/hb-app/ui/profiling-report.json
          if-no-files-found: ignore

      # F2 — the count tally must complete under its wall-clock budget (hb-core only, no frontend).
      - name: F2 count-tally wall-clock budget
        run: cargo test -p hb-core --locked count_tally_over_500_events_is_under_budget_f2

  # Supply-chain scanners — added by audit I-4. NON-BLOCKING (every scanner step carries
  # continue-on-error) until the baseline is triaged, then flip. Policy lives in deny.toml.
  supply-chain:
    name: supply chain (cargo-audit + cargo-deny + npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny

      - name: cargo audit (RustSec advisories over Cargo.lock)
        continue-on-error: true
        run: cargo audit

      - name: cargo deny (advisories + bans + sources)
        continue-on-error: true
        run: cargo deny check advisories bans sources

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: npm audit (frontend, high and above)
        continue-on-error: true
        working-directory: crates/hb-app/ui
        run: |
          npm ci
          npm audit --audit-level=high
