[package]
name    = "hb-core"
version = "0.4.3"
edition = "2021"

[dependencies]
serde      = { workspace = true }
serde_json = { workspace = true }
thiserror  = { workspace = true }
chrono     = { workspace = true }
hex        = { workspace = true }

# --- v0.9 Nostr core (M1). Pinned to the M0-verified surface (=0.43.1) so a silent
#     minor bump can't break the interop suite. bech32 0.11 = the `Hrp`/encode/decode API. ---
nostr             = { version = "=0.43.1", features = ["nip44"] }
bech32            = "0.11"

# --- legacy v0.4.3 core (still used by hb-app until its M4 Nostr cutover completes) ---
ed25519-dalek     = { version = "2", features = ["rand_core"] }
rand              = "0.8"
sha2              = "0.10"
bs58              = "0.5"
x25519-dalek      = { version = "2", features = ["static_secrets"] }
chacha20poly1305  = "0.10"
hkdf              = "0.12"
base64            = "0.22"

[dev-dependencies]
tokio = { workspace = true }
