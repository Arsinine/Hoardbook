##
## strfry config for the hb-it L2 integration relay (ephemeral; used by CI and locally).
##
## Vendored from the M0 spike's proven config (crates/hb-m0-spike/strfry.conf), with two
## test-relay choices: NIP-42 auth is OFF (no challenge friction for a throwaway relay) and the
## write-policy whitelist plugin is empty (M0 found dockurr/strfry ships it enabled, which
## rejects brand-new keys with "blocked: pubkey not in whitelist"). The LMDB dir is mounted at
## /app/strfry-db by the runner. maxEventSize stays at strfry's 64 KiB default — it is the cap
## that drives the N4 oversize-listing split.
##

db = "/app/strfry-db/"

dbParams {
    maxreaders = 256
    mapsize = 10995116277760
    noReadAhead = false
}

events {
    maxEventSize = 65536
    rejectEventsNewerThanSeconds = 900
    rejectEventsOlderThanSeconds = 94608000
    rejectEphemeralEventsOlderThanSeconds = 60
    ephemeralEventsLifetimeSeconds = 300
    maxNumTags = 2000
    maxTagValSize = 1024
}

relay {
    bind = "0.0.0.0"
    port = 7777
    nofiles = 1000000
    realIpHeader = ""

    auth {
        # NIP-42 auth OFF for the test relay — no AUTH challenge to negotiate.
        enabled = false
        serviceUrl = ""
    }

    info {
        name = "hb-it test relay"
        description = "Ephemeral strfry for Hoardbook L2 integration tests."
        pubkey = ""
        self = ""
        contact = ""
        icon = ""
        banner = ""
        privacy = ""
        terms = ""
        nips = ""
    }

    maxWebsocketPayloadSize = 131072
    maxReqFilterSize = 200
    autoPingSeconds = 55
    enableTcpKeepalive = false
    queryTimesliceBudgetMicroseconds = 10000
    maxFilterLimit = 500
    maxTagsPerFilter = 3
    maxFilterLimitCount = 1000000
    maxSubsPerConnection = 200

    writePolicy {
        # Empty: accept all kinds + brand-new keys (these are our own test relays).
        plugin = ""
        timeoutSeconds = 10
    }

    compression {
        enabled = true
        slidingWindow = true
    }

    logging {
        dumpInAll = false
        dumpInEvents = false
        dumpInReqs = false
        dbScanPerf = false
        invalidEvents = true
    }

    numThreads {
        ingester = 3
        reqWorker = 3
        reqMonitor = 3
        negentropy = 2
    }

    negentropy {
        enabled = true
        maxSyncEvents = 1000000
    }

    filterValidation {
        enabled = false
        maxFiltersPerReq = 3
        minFiltersPerReq = 1
        maxKindsPerFilter = 3
        allowedKinds = ""
        requireAuthorOrTag = false
    }
}
