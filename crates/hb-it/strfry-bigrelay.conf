##
## strfry config for the Hoardbook **big relay** (M16 Layer 3) — the higher-capacity relay the
## hoarder runs themselves to serve the FULL listing family behind a paywall teaser.
##
## Role (owner ruling 2026-07-16): public relays hold only the truncated ~40 KB teaser; the whole
## split family (index + every content part) is published HERE, to a relay the owner controls, so
## there is **no ban risk** for the write volume a large collection needs. A browser that has the
## share code fetches the family from this relay (targeting it exclusively — the family shares its
## `d=slug` with the public teaser, so it must be read on its own), restitches, and — gated on the
## snapshot fingerprint matching the teaser's — renders the full tree.
##
## Sizing: a listing part is a NIP-44-encrypted event, and NIP-44 caps *plaintext* at 65 408 bytes
## — a crypto limit no relay config lifts. So the family REUSES the normal 40 KB per-part budget;
## this relay does NOT need giant events. `maxEventSize` is nonetheless set generously (128 KB) to
## leave headroom for the base64 ciphertext + tags with no truncation surprises. The real difference
## from a public relay is operational: a permissive write policy for the owner + holders, a roomy DB
## for complete stashes, and longer retention.
##
## Deploy: adapt `db`, bind address/port, and (optionally) NIP-42 auth per RELAY_DEPLOY.md. This file
## also serves as the vendored variant an hb-it big-relay row can launch alongside strfry.conf.
##

db = "/var/lib/strfry-bigrelay/"

dbParams {
    maxreaders = 256
    # Roomy map for complete large collections (sparse file; grows on demand).
    mapsize = 10995116277760
    noReadAhead = false
}

events {
    # 128 KB: generous headroom over a 40 KB plaintext part's base64 ciphertext + tags. The wire
    # budget is still the 40 KB NIP-44 plaintext cap on the write side, not this number.
    maxEventSize = 131072
    rejectEventsNewerThanSeconds = 900
    # Longer retention than a throwaway relay — this relay is the durable full-manifest home.
    rejectEventsOlderThanSeconds = 315360000
    rejectEphemeralEventsOlderThanSeconds = 60
    ephemeralEventsLifetimeSeconds = 300
    maxNumTags = 2000
    maxTagValSize = 1024
}

relay {
    bind = "0.0.0.0"
    port = 7777
    # 0 = leave the OS open-files limit alone (strfry's stock 1000000 exceeds some runner caps).
    nofiles = 0
    realIpHeader = ""

    auth {
        # OFF here (matches the vendored test relay). A production deploy may enable NIP-42 to bound
        # writers to the owner + holders — see RELAY_DEPLOY.md.
        enabled = false
        serviceUrl = ""
    }

    info {
        name = "Hoardbook big relay"
        description = "Higher-capacity relay serving full listing families (M16 Layer 3)."
        pubkey = ""
        self = ""
        contact = ""
        icon = ""
        banner = ""
        privacy = ""
        terms = ""
        nips = ""
    }

    # Raised to comfortably carry the largest single part frame.
    maxWebsocketPayloadSize = 262144
    maxReqFilterSize = 200
    autoPingSeconds = 55
    enableTcpKeepalive = false
    queryTimesliceBudgetMicroseconds = 10000
    maxFilterLimit = 500
    maxTagsPerFilter = 3
    maxFilterLimitCount = 1000000
    maxSubsPerConnection = 200

    writePolicy {
        # Empty: accept all kinds + the owner's/holders' keys. This is the owner's own relay.
        plugin = ""
        timeoutSeconds = 10
    }

    compression {
        enabled = true
        slidingWindow = true
    }

    logging {
        dumpInAll = false
        dumpInEvents = false
        dumpInReqs = false
        dbScanPerf = false
        invalidEvents = true
    }

    numThreads {
        ingester = 3
        reqWorker = 3
        reqMonitor = 3
        negentropy = 2
    }

    negentropy {
        enabled = true
        maxSyncEvents = 1000000
    }

    filterValidation {
        enabled = false
        maxFiltersPerReq = 3
        minFiltersPerReq = 1
        maxKindsPerFilter = 3
        allowedKinds = ""
        requireAuthorOrTag = false
    }
}
