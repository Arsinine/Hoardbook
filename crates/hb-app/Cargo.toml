[package]
name    = "hb-app"
version = "0.12.3"
edition = "2021"
# Keep cargo's build-script fingerprint scan out of the frontend's generated trees.
# These are gitignored and regenerated by npm; only ui/build is embedded (via
# generate_context!). Without this, cargo walks ui/node_modules on every build —
# slow everywhere, and an outright failure on WSL2/DrvFs where the .vite cache
# entries intermittently fail to stat (os error 22).
exclude = ["ui/node_modules", "ui/.svelte-kit", "ui/.vite"]

[lib]
name = "hb_app"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "hb-app"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
hb-core    = { path = "../hb-core" }
hb-net     = { path = "../hb-net" }
# Direct `nostr` dep pinned to hb-core/hb-net's version, with the protocol features the app
# touches (NIP-44 listing crypto via hb-core, NIP-59/17 gift-wrap DMs via hb-net).
nostr      = { version = "=0.43.1", features = ["nip44", "nip59"] }
serde      = { workspace = true }
serde_json = { workspace = true }
thiserror  = { workspace = true }
anyhow     = { workspace = true }
chrono     = { workspace = true }
tokio      = { workspace = true }
tracing    = { workspace = true }
hex        = { workspace = true }
zeroize    = { workspace = true }
rand       = "0.8"
# M16 W4: decode a base64-pasted `.hbmanifest` (the file-picker's paste fallback). Pinned to the
# version hb-core already locks — a dependency edge, no new package in Cargo.lock.
base64     = "0.22"
# Whole-directory backup archive (M5). Restore treats every entry as hostile input
# (path-traversal / symlink / tar-bomb guards).
tar        = "0.4"

tauri               = { version = "2", features = ["tray-icon"] }
tauri-plugin-dialog = "2"
sha2    = "0.10"
tauri-plugin-process = "2"
tauri-plugin-updater = "2"
# Portable self-updater (Windows): fetch the signed portable binary and swap the running exe in place.
# Verification reuses the SAME minisign key + `minisign-verify` crate as the NSIS updater (byte-identical
# to tauri-plugin-updater's `verify_signature`), so no new trust root. `reqwest`/`semver`/`minisign-verify`
# are already in the lock (pinned to those versions) — only `self_replace` is a new package.
reqwest         = { version = "0.13", default-features = false, features = ["rustls", "rustls-native-certs"] }
semver          = "1"
minisign-verify = "0.2"
self-replace    = "1"
tempfile        = "3"
globset = "0.4"
# M9 snapshot auto-update: cross-platform filesystem watcher (inotify / FSEvents /
# ReadDirectoryChangesW). Kept behind a thin wrapper (`spawn_fs_watcher`) so the OS watcher is never
# in a unit test — the pure `watch_plan` is fake-clock tested. `async-trait` gives the injectable
# `PublishSink` seam the watch loop publishes through, so the loop is testable with a fake sink (no
# RelayClient).
notify      = "6"
async-trait = "0.1"

[target.'cfg(target_os = "windows")'.dependencies]
hb-dpapi = { path = "../hb-dpapi" }

# Single-instance enforcement (M8) — desktop-only; the plugin (and the concern) does not exist on
# mobile, so gate the dependency itself off the mobile targets, not just its usage.
[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
tauri-plugin-single-instance = "2"

[dev-dependencies]
tempfile = "3"
