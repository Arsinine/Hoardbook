[package]
name    = "hb-app"
version = "0.4.3"
edition = "2021"
# Keep cargo's build-script fingerprint scan out of the frontend's generated trees.
# These are gitignored and regenerated by npm; only ui/build is embedded (via
# generate_context!). Without this, cargo walks ui/node_modules on every build —
# slow everywhere, and an outright failure on WSL2/DrvFs where the .vite cache
# entries intermittently fail to stat (os error 22).
exclude = ["ui/node_modules", "ui/.svelte-kit", "ui/.vite"]

[lib]
name = "hb_app"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "hb-app"
path = "src/main.rs"

# Headless P2P integration harness (Test Plan Layer 3 / Suite P). Reuses the real
# iroh handlers from the hb-app lib; never starts the Tauri app. See p2p_it.rs.
[[bin]]
name = "hb-p2p-it"
path = "src/bin/hb-p2p-it.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
hb-core    = { path = "../hb-core" }
hb-net     = { path = "../hb-net" }
# Direct `nostr` dep pinned to hb-core/hb-net's version, with the protocol features the app
# touches (NIP-44 listing crypto via hb-core, NIP-59/17 gift-wrap DMs via hb-net).
nostr      = { version = "=0.43.1", features = ["nip44", "nip59"] }
serde      = { workspace = true }
serde_json = { workspace = true }
thiserror  = { workspace = true }
anyhow     = { workspace = true }
chrono     = { workspace = true }
tokio      = { workspace = true }
tracing    = { workspace = true }
hex        = { workspace = true }
zeroize    = "1"
rand       = "0.8"

tauri               = { version = "2", features = ["tray-icon"] }
tauri-plugin-dialog = "2"
sha2    = "0.10"
iroh    = { version = "0.98", default-features = false, features = ["tls-ring"] }
tauri-plugin-process = "2"
tauri-plugin-updater = "2"
globset = "0.4"

[target.'cfg(target_os = "windows")'.dependencies]
hb-dpapi = { path = "../hb-dpapi" }

[dev-dependencies]
tempfile = "3"
iroh = { version = "0.98", default-features = false, features = ["tls-ring"] }
